<style>
:root {
  --primary: #F5A623; --light: #FFD080;
  --bg: #0D1E3A; --surface: #1B2A4A; --border: #2A3D60;
  --text: #F5A623; --text2: #FFD080; --text3: #8A9DBD;
  --green: #5aaa70; --red: #cc5544;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'PingFang TC','Apple SD Gothic Neo','Microsoft JhengHei',sans-serif; font-weight:600; background:var(--bg); color:var(--text); min-height:100vh; }

/* Nav */
.main-nav {
  position:fixed; top:0; left:0; right:0; height:48px;
  background:rgba(13,30,58,0.97); border-bottom:1px solid var(--border);
  backdrop-filter:blur(10px); z-index:1000;
  display:flex; align-items:stretch;
}
.nav-logo { padding:0 12px; display:flex; align-items:center; font-size:13px; color:var(--text2); border-right:1px solid var(--border); white-space:nowrap; }
.nav-tabs { display:flex; flex:1; overflow-x:auto; scrollbar-width:none; }
.nav-tabs::-webkit-scrollbar { display:none; }
.nav-tab {
  flex-shrink:0; padding:0 11px; display:flex; align-items:center; gap:5px;
  font-size:11px; color:var(--text3); cursor:pointer;
  border-bottom:2px solid transparent; transition:all 0.2s; white-space:nowrap;
}
.nav-tab.am { color:var(--primary); border-bottom-color:var(--primary); }
.nav-tab.aa { color:#88ccaa; border-bottom-color:#88ccaa; }
.nav-tab.ap { color:#a080c8; border-bottom-color:#a080c8; }
.nav-tab.ac { color:var(--primary); border-bottom-color:var(--primary); }
.nav-tab.as { color:var(--text2); border-bottom-color:var(--text2); }
.nav-tab.ar { color:var(--text2); border-bottom-color:var(--text2); }
.dot { width:6px; height:6px; border-radius:50%; display:inline-block; }
.dm { background:var(--primary); }
.da { background:#88ccaa; }
.dp { background:#a080c8; }
.dc { background:var(--primary); }
.ds { background:var(--text2); }
.dr { background:var(--text2); }

/* Pages */
.page { display:none; padding-top:48px; min-height:100vh; }
.page.active { display:block; }

/* Item cards */
.items-grid-2 { display:grid; grid-template-columns:repeat(2,1fr); gap:1px; background:var(--border); }
.items-grid-1 { display:grid; grid-template-columns:1fr; gap:1px; background:var(--border); }
.items-grid-3 { display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:var(--border); }
.cat-label {
  grid-column:1/-1; padding:7px 12px; font-size:10px; font-weight:700;
  letter-spacing:0.12em; text-transform:uppercase;
  background:var(--bg); color:var(--text3); border-top:1px solid var(--border);
}
.item-card {
  background:var(--surface); padding:clamp(10px,2.5vw,18px) clamp(8px,2vw,14px);
  cursor:pointer; position:relative; transition:background 0.1s; user-select:none;
  display:flex; flex-direction:row; align-items:center; justify-content:space-between;
  border:1px solid var(--border); min-height:clamp(56px,10vw,80px); gap:8px;
}
.item-card:active { transform:scale(0.96); background:#2A3D60; }
.item-name { font-size:clamp(15px,3.5vw,26px); line-height:1.3; color:var(--text2); font-weight:700; flex:1; }
.item-price { font-size:clamp(15px,3.5vw,26px); font-weight:700; color:var(--primary); flex-shrink:0; text-align:right; }
.qty-badge {
  position:absolute; top:4px; right:4px;
  width:clamp(18px,4vw,26px); height:clamp(18px,4vw,26px);
  border-radius:50%; font-size:clamp(10px,2.5vw,13px); font-weight:700;
  display:none; align-items:center; justify-content:center;
  color:var(--bg); background:var(--primary);
}
.item-card.hq .qty-badge { display:flex; }
.items-grid-1 .item-card { min-height:clamp(50px,8vw,70px); }
.items-grid-1 .qty-badge { top:50%; transform:translateY(-50%); right:8px; }

/* Tab row */
.tab-row {
  display:flex; border-bottom:1px solid var(--border);
  background:var(--bg); position:sticky; top:48px; z-index:10;
}
.tab-btn {
  flex:1; padding:10px 4px; text-align:center;
  font-size:12px; color:var(--text3); cursor:pointer;
  border-bottom:2px solid transparent; transition:all 0.15s;
}
.tab-btn.active { color:var(--primary); border-bottom-color:var(--primary); }

/* Customer row */
.customer-row {
  display:flex; align-items:center; gap:8px;
  padding:8px 14px; border-bottom:1px solid var(--border); background:var(--bg);
}
.row-label { font-size:11px; color:var(--text3); white-space:nowrap; }
.row-input {
  flex:1; background:var(--surface); border:1px solid var(--border);
  border-radius:6px; padding:6px 10px; color:var(--text);
  font-family:'PingFang TC',sans-serif; font-size:13px; outline:none;
}
.row-input:focus { border-color:var(--primary); }
.new-toggle { display:flex; align-items:center; gap:5px; cursor:pointer; flex-shrink:0; }
.new-check {
  width:20px; height:20px; border-radius:4px;
  border:2px solid var(--primary); background:transparent;
  display:flex; align-items:center; justify-content:center; transition:all 0.15s;
}
.new-check.on { background:var(--primary); }
.new-check.on::after { content:'✓'; color:var(--bg); font-size:12px; font-weight:800; }
.new-label { font-size:12px; color:var(--primary); font-weight:700; white-space:nowrap; }

/* Datetime row */
.dt-row {
  display:flex; align-items:center; gap:8px;
  padding:7px 14px; border-bottom:1px solid var(--border); background:var(--bg);
}

/* Note row */
.note-row {
  padding:9px 14px; display:flex; gap:8px; align-items:center;
  border-top:1px solid var(--border); background:var(--bg);
}

/* Cart */
.cart-section { padding:10px 14px 0; }
.cart-title { font-size:10px; color:var(--text3); letter-spacing:0.1em; text-transform:uppercase; margin-bottom:6px; }
.cart-item {
  display:flex; align-items:center; gap:7px;
  padding:8px 10px; background:var(--surface); border-radius:6px; margin-bottom:3px;
}
.ci-name { flex:1; font-size:13px; color:var(--text2); }
.qc { display:flex; align-items:center; gap:4px; }
.qb {
  width:26px; height:26px; border-radius:4px;
  border:1px solid var(--border); background:var(--bg);
  color:var(--text2); font-size:15px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
}
.qb:active { background:var(--primary); color:var(--bg); }
.qn { font-size:13px; min-width:20px; text-align:center; color:var(--text); }
.ci-sub { font-size:13px; min-width:44px; text-align:right; color:var(--primary); font-weight:700; }

/* Order summary */
.order-summary {
  margin:10px 14px;
  background:var(--surface); border:1px solid var(--border);
  border-radius:8px; padding:12px 14px;
}
.summary-row {
  display:flex; justify-content:space-between;
  font-size:13px; color:var(--text2); margin-bottom:6px;
}
.summary-row.total {
  margin-top:8px; padding-top:8px;
  border-top:1px solid var(--border);
  font-size:18px; font-weight:800;
}
.summary-row.total .sv { color:var(--light); }
.sv { font-weight:700; color:var(--primary); }

/* Buttons */
.submit-btn {
  margin:8px 14px 20px; width:calc(100% - 28px);
  padding:15px; border:none; border-radius:10px;
  font-family:'PingFang TC',sans-serif; font-size:16px; font-weight:800;
  cursor:pointer; letter-spacing:0.08em; transition:all 0.15s;
  background:var(--primary); color:var(--bg);
}
.submit-btn:disabled { background:var(--border); color:var(--text3); cursor:not-allowed; }
.submit-btn:active { opacity:0.85; }
.secondary-btn {
  margin:0 14px 8px; width:calc(100% - 28px);
  padding:12px; border:1px solid var(--border); border-radius:10px;
  font-family:'PingFang TC',sans-serif; font-size:14px; font-weight:700;
  cursor:pointer; background:transparent; color:var(--text2);
}

/* Success */
.success-screen {
  display:none; position:fixed; inset:0;
  background:rgba(8,8,8,0.96); z-index:2000;
  flex-direction:column; align-items:center; justify-content:center;
  gap:14px; text-align:center;
}
.success-screen.show { display:flex; }
.s-icon { font-size:64px; }
.s-msg { font-size:22px; font-weight:800; color:var(--light); }
.s-sub { font-size:14px; color:var(--text3); }
.s-back {
  margin-top:12px; padding:12px 30px; border-radius:10px; border:none;
  font-family:'PingFang TC',sans-serif; font-size:15px; font-weight:800;
  cursor:pointer; background:var(--primary); color:var(--bg);
}

/* Autocomplete */
.ac-wrap { position:relative; flex:1; }
.ac-drop {
  position:absolute; top:100%; left:0; right:0; z-index:500;
  background:#1a1e24; border:1px solid #3a3828;
  border-top:none; border-radius:0 0 8px 8px;
  max-height:200px; overflow-y:auto;
  box-shadow:0 8px 24px rgba(0,0,0,0.5);
}
.ac-item { padding:9px 12px; cursor:pointer; border-bottom:1px solid #2a2820; }
.ac-item:hover,.ac-item.on { background:#2a2820; }
.ac-name { font-size:13px; color:#f0ece0; }
.ac-sub { font-size:10px; color:#6a6058; margin-top:2px; }

/* Admin */
.admin-header {
  padding:10px 14px; display:flex; justify-content:space-between; align-items:center;
  border-bottom:1px solid var(--border); position:sticky; top:48px; z-index:10; background:var(--bg);
}
.admin-title { font-size:14px; font-weight:800; }
.stat-pill { font-family:'PingFang TC',monospace; font-size:11px; padding:3px 9px; border-radius:20px; background:var(--surface); color:var(--primary); }
.refresh-btn {
  padding:5px 11px; border-radius:6px; border:1px solid var(--border);
  background:transparent; color:var(--text2); font-size:11px; cursor:pointer;
  font-family:'PingFang TC',sans-serif;
}
.orders-list { padding:8px 14px; }
.order-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:8px; padding:11px 13px; margin-bottom:7px;
}
.order-card.done { opacity:0.45; }
.oc-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:5px; }
.oc-id { font-size:11px; color:var(--text3); }
.oc-time { font-size:11px; color:var(--text2); }
.oc-items { font-size:12px; color:var(--text2); line-height:1.6; margin-bottom:7px; }
.oc-bottom { display:flex; justify-content:space-between; align-items:center; }
.oc-total { font-size:16px; font-weight:800; color:var(--primary); }
.oc-note { font-size:11px; color:var(--text3); font-style:italic; }
.order-actions { display:flex; align-items:center; gap:4px; }
.done-btn {
  padding:5px 13px; border-radius:6px; border:none;
  font-family:'PingFang TC',sans-serif; font-size:12px; font-weight:700; cursor:pointer;
  background:var(--primary); color:var(--bg);
}
.done-btn.completed { background:var(--border); color:var(--text3); cursor:default; }
.kitchen-btn {
  padding:5px 10px; border-radius:6px; border:2px solid var(--primary);
  background:transparent; color:var(--primary);
  font-family:'PingFang TC',sans-serif; font-size:12px; font-weight:700; cursor:pointer;
}
.kitchen-btn.done { background:#2A4A1A; border-color:var(--green); color:var(--green); cursor:default; }
.sbadge { font-size:10px; padding:2px 8px; border-radius:10px; font-weight:700; }
.sp { background:#3a2a10; color:#e8a040; }
.sd { background:#1a2a1a; color:var(--green); }
.empty-msg { text-align:center; padding:40px 20px; color:var(--text3); font-size:13px; }
.loading-msg { text-align:center; padding:20px; color:var(--text3); font-size:12px; }
.quick-btn {
  position:fixed; bottom:20px; right:16px;
  width:50px; height:50px; border-radius:50%; border:none;
  font-size:22px; cursor:pointer; box-shadow:0 4px 16px rgba(0,0,0,0.4);
  z-index:100; background:var(--primary); color:var(--bg);
}

/* Report */
.report-wrap { padding:14px; }
.report-filters {
  display:flex; flex-wrap:wrap; gap:6px; margin-bottom:12px;
}
.rf-btn {
  padding:6px 12px; border-radius:6px; border:1px solid var(--border);
  background:var(--surface); color:var(--text2); font-size:12px; cursor:pointer;
  font-family:'PingFang TC',sans-serif; font-weight:600; transition:all 0.15s;
}
.rf-btn.active { background:var(--primary); border-color:var(--primary); color:var(--bg); font-weight:800; }
.custom-date-row { display:flex; gap:8px; margin-bottom:10px; }
.date-input {
  flex:1; background:var(--surface); border:1px solid var(--border);
  border-radius:6px; padding:7px 10px; color:var(--text);
  font-family:'PingFang TC',sans-serif; font-size:12px; outline:none;
}
.date-input:focus { border-color:var(--primary); }
.item-search-row { display:flex; gap:8px; margin-bottom:12px; }
.item-search {
  flex:1; background:var(--surface); border:1px solid var(--border);
  border-radius:6px; padding:8px 12px; color:var(--text);
  font-family:'PingFang TC',sans-serif; font-size:13px; outline:none;
}
.item-search:focus { border-color:var(--primary); }
.search-btn {
  padding:8px 16px; border-radius:6px; border:none;
  background:var(--primary); color:var(--bg);
  font-family:'PingFang TC',sans-serif; font-size:13px; font-weight:800; cursor:pointer;
}
.rcard {
  background:var(--surface); border:1px solid var(--border);
  border-radius:10px; padding:13px 15px; margin-bottom:10px;
}
.rcard-title { font-size:13px; font-weight:800; padding-bottom:9px; margin-bottom:9px; border-bottom:1px solid var(--border); }
.rrow { display:flex; justify-content:space-between; font-size:12px; color:var(--text2); margin-bottom:5px; }
.rrow .rv { color:var(--text); font-weight:700; }
.rrow.hl { margin-top:7px; padding-top:7px; border-top:1px solid var(--border); }
.rrow.hl .rl { font-weight:800; color:var(--text); }
.rrow.hl .rv { color:var(--green); font-size:15px; font-weight:800; }
.item-result { font-size:11px; color:var(--text2); line-height:1.8; margin-top:6px; }
.copy-btn {
  width:100%; padding:12px; background:var(--surface);
  border:1px solid var(--border); border-radius:8px; color:var(--text2);

/* Modal */
.modal-overlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,0.8); z-index:3000;
  align-items:flex-end; justify-content:center;
}
.modal-overlay.show { display:flex; }

}
.modal-title {
  font-size:16px; font-weight:800; margin-bottom:16px;

}
.modal-close { font-size:20px; cursor:pointer; color:var(--text2); background:none; border:none; }
.modal-field { margin-bottom:12px; }
.modal-label { font-size:11px; color:var(--text2); margin-bottom:4px; display:block; }
.modal-input {

}
.modal-input:focus { border-color:var(--primary); }
.modal-save { width:100%; padding:13px; border:none; border-radius:8px; background:var(--primary); color:var(--bg); font-family:'PingFang TC',sans-serif; font-size:15px; font-weight:800; cursor:pointer; margin-top:4px; }
.modal-del { width:100%; padding:10px; border:1px solid var(--red); border-radius:8px; background:transparent; color:var(--red); font-family:'PingFang TC',sans-serif; font-size:13px; cursor:pointer; margin-top:8px; }

.s-add-row { display:flex; gap:8px; margin-top:8px; }

/* History */
.history-header {
  padding:10px 14px; display:flex; gap:8px; align-items:center;
  border-bottom:1px solid var(--border); position:sticky; top:48px; z-index:10; background:var(--bg);

}
.h-search {

.h-list { padding:8px 14px 30px; }
.load-more-btn { width:calc(100% - 28px); margin:0 14px; padding:11px; background:var(--surface); border:1px solid var(--border); border-radius:8px; color:var(--text2); font-family:'PingFang TC',sans-serif; font-size:13px; cursor:pointer; }

/* Purchase order card */

.pu-val { font-size:12px; color:var(--text2); line-height:1.6; }

/* Online order */
.online-wrap { padding:14px 14px 40px; }
.ol-section { margin-bottom:20px; }
.ol-title { font-size:13px; font-weight:800; color:var(--primary); padding-bottom:8px; margin-bottom:12px; border-bottom:1px solid var(--border); }
.field-row { margin-bottom:10px; }
.field-label { font-size:11px; color:var(--text2); margin-bottom:4px; display:block; }

.field-input:focus { border-color:var(--primary); }
.option-group { display:flex; flex-wrap:wrap; gap:6px; margin-top:4px; }
.option-btn { padding:7px 14px; border-radius:6px; border:1px solid var(--border); background:var(--surface); color:var(--text2); font-size:12px; cursor:pointer; font-family:'PingFang TC',sans-serif; font-weight:600; transition:all 0.15s; }
.option-btn.selected { background:var(--primary); border-color:var(--primary); color:var(--bg); font-weight:800; }
.bean-list { display:flex; flex-direction:column; gap:4px; }
.bean-item { display:flex; align-items:center; gap:10px; padding:10px 12px; background:var(--surface); border-radius:6px; border:1px solid var(--border); cursor:pointer; }
.bean-item.checked { border-color:var(--primary); background:#1e2a3a; }
.bean-check { width:18px; height:18px; border-radius:4px; border:2px solid var(--border); flex-shrink:0; display:flex; align-items:center; justify-content:center; }
.bean-item.checked .bean-check { background:var(--primary); border-color:var(--primary); }

.bean-item.checked .bean-check::after { display:block; }
.bean-name { font-size:13px; flex:1; color:var(--text2); }
.bean-qty { display:flex; align-items:center; gap:6px; opacity:0; pointer-events:none; transition:opacity 0.15s; }
.bean-item.checked .bean-qty { opacity:1; pointer-events:auto; }
.bqb { width:26px; height:26px; border-radius:4px; border:1px solid var(--border); background:var(--bg); color:var(--text2); font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.bqb:active { background:var(--primary); color:var(--bg); }
.bqn { font-size:13px; min-width:18px; text-align:center; color:var(--text); }
.loading-items { padding:20px; text-align:center; color:var(--text3); font-size:12px; }

/* Confirm page */
.confirm-page { padding:14px 14px 40px; display:none; }
.confirm-page.show { display:block; }

/* Toast */
.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--green); color:#111; padding:7px 18px; border-radius:20px; font-size:12px; font-weight:700; opacity:0; transition:opacity 0.25s; z-index:9999; white-space:nowrap; pointer-events:none; }
.toast.show { opacity:1; }

</style>

async function loadOrders(store) {
  const pre = store==='muri' ? 'ma' : 'aa';
  const listEl = document.getElementById(pre+'-list') || document.getElementById((store==='muri'?'mo':'ao')+'-list');
  if(listEl) listEl.innerHTML='<div class="loading-msg">載入中…</div>';
  try {
    const res = await fetch(GAS+'?action=orders&store='+store+'&limit=100');
    const data = await res.json();
    orders[store] = data.orders||[];
    renderOrders(store);
    updateOrderStats(store);
  } catch(e) {
    if(listEl) listEl.innerHTML='<div class="empty-msg">載入失敗，請重試</div>';
  }
}

function getPeriodDates(period) {
  const now=new Date(); const y=now.getFullYear(); const m=now.getMonth(); const d=now.getDate();
  if(period==='today') return [new Date(y,m,d), new Date(y,m,d,23,59,59)];
  if(period==='week') {
    const day=now.getDay(); const mon=new Date(y,m,d-(day===0?6:day-1));
    return [mon, new Date(y,m,d,23,59,59)];
  }
  if(period==='month') return [new Date(y,m,1), new Date(y,m,d,23,59,59)];
  if(period==='quarter') {
    const qStart=Math.floor(m/3)*3;
    return [new Date(y,qStart,1), new Date(y,m,d,23,59,59)];
  }
  if(period==='year') return [new Date(y,0,1), new Date(y,m,d,23,59,59)];
  if(period==='custom') {
    const from=document.getElementById('date-from').value;
    const to=document.getElementById('date-to').value;
    if(!from||!to) return null;
    return [new Date(from), new Date(to+'T23:59:59')];
  }
  return null;
}

function setPeriod(p, btn) {
  currentPeriod=p;
  document.querySelectorAll('#rp-period-btns .rf-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');

  if(p!=='custom') loadReport();
}

async function loadReport() {
  const dates=getPeriodDates(currentPeriod);
  if(!dates) return;
  const [from,to]=dates;
  try {
    const [mRes,aRes]=await Promise.all([
      fetch(GAS+'?action=orders&store=muri&limit=2000'),
      fetch(GAS+'?action=orders&store=apple&limit=2000')
    ]);
    const mData=await mRes.json(), aData=await aRes.json();
    allReportOrders.muri=(mData.orders||[]).filter(o=>inRange(o,from,to));
    allReportOrders.apple=(aData.orders||[]).filter(o=>inRange(o,from,to));
    renderReport();
  } catch(e) { toast('載入失敗'); }
}

function inRange(o, from, to) {
  const t=o.orderTime||o.time;
  if(!t) return false;
  try {
    const d=new Date(t.replace(/(\d+)\/(\d+)/,'$1/$2/2026'));
    return d>=from && d<=to;
  } catch(e) { return true; }
}

function calcCost(items, menu) {
  if(!items) return 0;
  let total=0;
  items.split('、').forEach(part=>{
    const m=part.match(/^(.+?)×(\d+)$/);
    if(!m) return;
    const found=menu.find(x=>x.n===m[1].trim());
    if(found&&found.cost) total+=found.cost*(parseInt(m[2])||1);
  });
  return Math.round(total);
}

function countItems(ords) {
  const counts={};
  ords.forEach(o=>{
    if(!o.items) return;
    o.items.split('、').forEach(part=>{
      const m=part.match(/^(.+?)×(\d+)$/);
      if(!m) return;
      counts[m[1].trim()]=(counts[m[1].trim()]||0)+(parseInt(m[2])||1);
    });
  });
  return counts;
}

  if(editIdx!==null) cdbData[editIdx]=c; else cdbData.unshift(c);
  try { await fetch(GAS,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({type:'updateCustomer',...c})}); } catch(e) {}
  CUSTOMERS=[...cdbData];
  renderCdb(cdbData); closeModal(); toast('✓ 已儲存');
}

function delCustomer() {
  if(editIdx===null) return;
  if(!confirm('確定要刪除？')) return;
  cdbData.splice(editIdx,1); CUSTOMERS=[...cdbData];
  renderCdb(cdbData); closeModal(); toast('已刪除');
}

// ══ 設定 ══
async function loadSettings() {
  renderBeans(); renderFilters(); renderPrices();
  try {
    const [bRes,fRes]=await Promise.all([fetch(GAS+'?action=beans'),fetch(GAS+'?action=filters')]);
    const bData=await bRes.json(), fData=await fRes.json();
    if(bData.items&&bData.items.length>0){settingsBeans=bData.items;renderBeans();}
    if(fData.items&&fData.items.length>0){settingsFilters=fData.items;renderFilters();}
    toast('✓ 已從試算表更新');
  } catch(e) { /* 使用內建預設值 */ }
}

function renderBeans() {
  document.getElementById('beans-list').innerHTML=settingsBeans.map((n,i)=>`
    <div class="s-item">
      <input class="s-edit-input" value="${n.replace(/"/g,'&quot;')}"
        oninput="settingsBeans[${i}]=this.value"
        onchange="settingsBeans[${i}]=this.value">
      <button class="s-del-btn" onclick="delItem('beans',${i})">✕</button>
    </div>`).join('')||'<div style="color:var(--text3);font-size:12px;padding:8px">尚無品項</div>';
}

function renderFilters() {
  document.getElementById('filters-list').innerHTML=settingsFilters.map((n,i)=>`
    <div class="s-item">
      <input class="s-edit-input" value="${n.replace(/"/g,'&quot;')}"
        oninput="settingsFilters[${i}]=this.value"
        onchange="settingsFilters[${i}]=this.value">
      <button class="s-del-btn" onclick="delItem('filters',${i})">✕</button>
    </div>`).join('')||'<div style="color:var(--text3);font-size:12px;padding:8px">尚無品項</div>';
}

function renderPrices() {
  document.getElementById('muri-prices').innerHTML=muriMenu.map(m=>`
    <div class="s-price-row"><span class="s-price-name">${m.n}</span><span class="s-price-val">$${m.p}</span></div>`).join('');
  document.getElementById('apple-prices').innerHTML=appleMenu.map(m=>`
    <div class="s-price-row"><span class="s-price-name">${m.n}</span><span class="s-price-val">$${m.p}</span></div>`).join('');
}

async function saveList(type) {
  const elId = type==='beans' ? 'beans-list' : 'filters-list';
  // 強制從畫面input讀取最新值（避免iOS onchange未觸發）
  const newItems = [];
  document.querySelectorAll('#'+elId+' .s-edit-input').forEach(inp => {
    const v = inp.value.trim();
    if (v) newItems.push(v);
  });
  // 更新JS陣列
  if (type==='beans') settingsBeans = newItems;
  else settingsFilters = newItems;

  // 顯示儲存中
  toast('儲存中…');
  try {
    await fetch(GAS, {method:'POST', mode:'no-cors',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({type:'saveList', listType:type, items:newItems})});
    toast('✓ '+(type==='beans'?'豆單':'濾掛清單')+'已儲存（'+newItems.length+'款）');
  } catch(e) {
    toast('✓ 已儲存到本機（'+newItems.length+'款）');
  }
}

function addItem(type) {
  const inputId=type==='beans'?'bean-add':'filter-add';
  const val=document.getElementById(inputId).value.trim();
  if(!val) return;
  if(type==='beans') settingsBeans.push(val); else settingsFilters.push(val);
  document.getElementById(inputId).value='';
  if(type==='beans') renderBeans(); else renderFilters();
}

function delItem(type,idx) {
  if(type==='beans') { settingsBeans.splice(idx,1); renderBeans(); }
  else { settingsFilters.splice(idx,1); renderFilters(); }
}

function toast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

// 初始化
renderBeans(); renderFilters(); renderPrices();
go('ao');
</script>
