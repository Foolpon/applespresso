<style>
:root {
  --primary: #F5A623; --light: #FFD080;
  --bg: #0D1E3A; --surface: #1B2A4A; --border: #2A3D60;
  --text: #F5A623; --text2: #FFD080; --text3: #8A9DBD;
  --green: #5aaa70; --red: #cc5544;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'PingFang TC','Apple SD Gothic Neo','Microsoft JhengHei',sans-serif; font-weight:600; background:var(--bg); color:var(--text); min-height:100vh; }

/* Nav */
.main-nav {
  position:fixed; top:0; left:0; right:0; height:48px;
  background:rgba(13,30,58,0.97); border-bottom:1px solid var(--border);
  backdrop-filter:blur(10px); z-index:1000;
  display:flex; align-items:stretch;
}
.nav-logo { padding:0 12px; display:flex; align-items:center; font-size:13px; color:var(--text2); border-right:1px solid var(--border); white-space:nowrap; }
.nav-tabs { display:flex; flex:1; overflow-x:auto; scrollbar-width:none; }
.nav-tabs::-webkit-scrollbar { display:none; }
.nav-tab {
  flex-shrink:0; padding:0 11px; display:flex; align-items:center; gap:5px;
  font-size:11px; color:var(--text3); cursor:pointer;
  border-bottom:2px solid transparent; transition:all 0.2s; white-space:nowrap;
}
.nav-tab.am { color:var(--primary); border-bottom-color:var(--primary); }
.nav-tab.aa { color:#88ccaa; border-bottom-color:#88ccaa; }
.nav-tab.ap { color:#a080c8; border-bottom-color:#a080c8; }
.nav-tab.ac { color:var(--primary); border-bottom-color:var(--primary); }
.nav-tab.as { color:var(--text2); border-bottom-color:var(--text2); }
.nav-tab.ar { color:var(--text2); border-bottom-color:var(--text2); }
.dot { width:6px; height:6px; border-radius:50%; display:inline-block; }
.dm { background:var(--primary); }
.da { background:#88ccaa; }
.dp { background:#a080c8; }
.dc { background:var(--primary); }
.ds { background:var(--text2); }
.dr { background:var(--text2); }

/* Pages */
.page { display:none; padding-top:48px; min-height:100vh; }
.page.active { display:block; }

/* Item cards */
.items-grid-2 { display:grid; grid-template-columns:repeat(2,1fr); gap:1px; background:var(--border); }
.items-grid-1 { display:grid; grid-template-columns:1fr; gap:1px; background:var(--border); }
.items-grid-3 { display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:var(--border); }
.cat-label {
  grid-column:1/-1; padding:7px 12px; font-size:10px; font-weight:700;
  letter-spacing:0.12em; text-transform:uppercase;
  background:var(--bg); color:var(--text3); border-top:1px solid var(--border);
}
.item-card {
  background:var(--surface); padding:clamp(10px,2.5vw,18px) clamp(8px,2vw,14px);
  cursor:pointer; position:relative; transition:background 0.1s; user-select:none;
  display:flex; flex-direction:row; align-items:center; justify-content:space-between;
  border:1px solid var(--border); min-height:clamp(56px,10vw,80px); gap:8px;
}
.item-card:active { transform:scale(0.96); background:#2A3D60; }
.item-name { font-size:clamp(15px,3.5vw,26px); line-height:1.3; color:var(--text2); font-weight:700; flex:1; }
.item-price { font-size:clamp(15px,3.5vw,26px); font-weight:700; color:var(--primary); flex-shrink:0; text-align:right; }
.qty-badge {
  position:absolute; top:4px; right:4px;
  width:clamp(18px,4vw,26px); height:clamp(18px,4vw,26px);
  border-radius:50%; font-size:clamp(10px,2.5vw,13px); font-weight:700;
  display:none; align-items:center; justify-content:center;
  color:var(--bg); background:var(--primary);
}
.item-card.hq .qty-badge { display:flex; }
.items-grid-1 .item-card { min-height:clamp(50px,8vw,70px); }
.items-grid-1 .qty-badge { top:50%; transform:translateY(-50%); right:8px; }

/* Tab row */
.tab-row {
  display:flex; border-bottom:1px solid var(--border);
  background:var(--bg); position:sticky; top:48px; z-index:10;
}
.tab-btn {
  flex:1; padding:10px 4px; text-align:center;
  font-size:12px; color:var(--text3); cursor:pointer;
  border-bottom:2px solid transparent; transition:all 0.15s;
}
.tab-btn.active { color:var(--primary); border-bottom-color:var(--primary); }

/* Customer row */
.customer-row {
  display:flex; align-items:center; gap:8px;
  padding:8px 14px; border-bottom:1px solid var(--border); background:var(--bg);
}

function getPeriodDates(period) {
  const now=new Date(); const y=now.getFullYear(); const m=now.getMonth(); const d=now.getDate();
  if(period==='today') return [new Date(y,m,d), new Date(y,m,d,23,59,59)];
  if(period==='week') {
    const day=now.getDay(); const mon=new Date(y,m,d-(day===0?6:day-1));
    return [mon, new Date(y,m,d,23,59,59)];
  }
  if(period==='month') return [new Date(y,m,1), new Date(y,m,d,23,59,59)];
  if(period==='quarter') {
    const qStart=Math.floor(m/3)*3;
    return [new Date(y,qStart,1), new Date(y,m,d,23,59,59)];
  }
  if(period==='year') return [new Date(y,0,1), new Date(y,m,d,23,59,59)];
  if(period==='custom') {
    const from=document.getElementById('date-from').value;
    const to=document.getElementById('date-to').value;
    if(!from||!to) return null;
    return [new Date(from), new Date(to+'T23:59:59')];
  }
  return null;
}

  currentPeriod=p;
  document.querySelectorAll('#rp-period-btns .rf-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');

  if(p!=='custom') loadReport();

async function loadReport() {
  const dates=getPeriodDates(currentPeriod);
  if(!dates) return;
  const [from,to]=dates;
  try {
    const [mRes,aRes]=await Promise.all([
      fetch(GAS+'?action=orders&store=muri&limit=2000'),
      fetch(GAS+'?action=orders&store=apple&limit=2000')
    ]);
    const mData=await mRes.json(), aData=await aRes.json();
    allReportOrders.muri=(mData.orders||[]).filter(o=>inRange(o,from,to));
    allReportOrders.apple=(aData.orders||[]).filter(o=>inRange(o,from,to));
    renderReport();
  } catch(e) { toast('載入失敗'); }
}

function inRange(o, from, to) {
  const t=o.orderTime||o.time;
  if(!t) return false;
  try {
    const d=new Date(t.replace(/(\d+)\/(\d+)/,'$1/$2/2026'));
    return d>=from && d<=to;
  } catch(e) { return true; }
}

function calcCost(items, menu) {
  if(!items) return 0;
  let total=0;
  items.split('、').forEach(part=>{
    const m=part.match(/^(.+?)×(\d+)$/);
    if(!m) return;
    const found=menu.find(x=>x.n===m[1].trim());
    if(found&&found.cost) total+=found.cost*(parseInt(m[2])||1);
  });
  return Math.round(total);
}

function countItems(ords) {
  const counts={};
  ords.forEach(o=>{
    if(!o.items) return;
    o.items.split('、').forEach(part=>{
      const m=part.match(/^(.+?)×(\d+)$/);
      if(!m) return;
      counts[m[1].trim()]=(counts[m[1].trim()]||0)+(parseInt(m[2])||1);
    });
  });
  return counts;
}

      o.items.split('、').forEach(part=>{
        const m=part.match(/^(.+?)×(\d+)$/);
        if(!m) return;
        if(m[1].trim().toLowerCase().includes(q)) cb(parseInt(m[2])||1, menu.find(x=>x.n===m[1].trim())?.p||0, parseInt(m[2])||1);
      });
    });
  };
  processOrds(allReportOrders.muri,muriMenu,(q,p,n)=>{muriCount+=n;muriRev+=p*n;});
  processOrds(allReportOrders.apple,appleMenu,(q,p,n)=>{appleCount+=n;appleRev+=p*n;});
  document.getElementById('item-result').innerHTML=`
    <div class="rcard" style="margin-bottom:10px">
      <div class="rcard-title">🔍 品項查詢結果</div>
      <div class="rrow"><span class="rl">木日山</span><span class="rv">${muriCount} 份 / $${muriRev}</span></div>
      <div class="rrow"><span class="rl">景華街</span><span class="rv">${appleCount} 份 / $${appleRev}</span></div>
      <div class="rrow hl"><span class="rl">合計</span><span class="rv">${muriCount+appleCount} 份 / $${muriRev+appleRev}</span></div>
    </div>`;
}

function copyReport() {
  const now=new Date().toLocaleDateString('zh-TW');
  const mOrd=allReportOrders.muri||[], aOrd=allReportOrders.apple||[];
  const mRev=mOrd.reduce((s,o)=>s+(parseInt(o.total)||0),0);
  const aRev=aOrd.reduce((s,o)=>s+(parseInt(o.total)||0),0);
  const mCost=mOrd.reduce((s,o)=>s+calcCost(o.items,muriMenu),0);
  const aCost=aOrd.reduce((s,o)=>s+calcCost(o.items,appleMenu),0);
  const txt=`📊 ${now} 報表
⛰ 木日山：來客${mOrd.length}人(新客${mOrd.filter(o=>o.isNew).length}) / 營收$${mRev} / 毛利$${mRev-mCost}
🍎 景華街：來客${aOrd.length}人(新客${aOrd.filter(o=>o.isNew).length}) / 營收$${aRev} / 毛利$${aRev-aCost}
📌 合計：${mOrd.length+aOrd.length}人 / 營收$${mRev+aRev} / 毛利$${mRev+aRev-mCost-aCost}`;
  navigator.clipboard.writeText(txt).then(()=>toast('✓ 已複製'));
}

// ══ 客戶資料庫 ══
let customerHistory={};
async function loadCdbHistory() {
  renderCdb(cdbData);
  try {
    const [mRes,aRes]=await Promise.all([
      fetch(GAS+'?action=orders&store=muri&limit=2000'),
      fetch(GAS+'?action=orders&store=apple&limit=2000')
    ]);
    const mData=await mRes.json(), aData=await aRes.json();
    const all=[...(mData.orders||[]),...(aData.orders||[])];
    const hist={};
    all.forEach(o=>{
      if(!o.customer) return;
      if(!hist[o.customer]) hist[o.customer]={dates:[],items:{}};
      if(o.time) hist[o.customer].dates.push(o.orderTime||o.time);
      if(o.items) o.items.split('、').forEach(p=>{
        const m=p.match(/^(.+?)×(\d+)$/); if(!m) return;
        hist[o.customer].items[m[1].trim()]=(hist[o.customer].items[m[1].trim()]||0)+(parseInt(m[2])||1);
      });
    });
    Object.entries(hist).forEach(([name,data])=>{
      const sorted=data.dates.sort().reverse();
      const topItems=Object.entries(data.items).sort((a,b)=>b[1]-a[1]).slice(0,2).map(([n])=>n);
      customerHistory[name]={lastVisit:sorted[0]||'',topItems};
    });
    renderCdb(cdbData);
  } catch(e) {}
}

function renderCdb(list) {
  const el=document.getElementById('cdb-list');
  if(!list.length){el.innerHTML='<div class="empty-msg">沒有符合的客戶</div>';return;}
  el.innerHTML=list.map((c,i)=>{
    const h=customerHistory[c.name]||{};
    return `<div class="cdb-card" onclick="openModal(${i})">
      <div class="cdb-top">
        <div class="cdb-name">${c.name}</div>
        <div class="cdb-count">訂購 ${c.count||1} 次</div>
      </div>
      <div class="cdb-info">
        ${c.phone?'📞 '+c.phone+'<br>':''}
        ${c.address?'📍 '+c.address+'<br>':''}
        ${c.delivery?'🚚 '+c.delivery+'<br>':''}
        ${h.lastVisit?'🗓 最近：'+h.lastVisit+'<br>':''}
        ${h.topItems?.length?'⭐ 常買：'+h.topItems.join('、'):''}
      </div>
    </div>`;
  }).join('');
}

function cdbSearch() {
  const q=document.getElementById('cdb-q').value.trim().toLowerCase();
  if(!q) { renderCdb(cdbData); return; }
  renderCdb(cdbData.filter(c=>c.name.toLowerCase().includes(q)||(c.phone&&c.phone.includes(q))||(c.address&&c.address.toLowerCase().includes(q))));
}

function openModal(idx) {
  editIdx=idx;
  const modal=document.getElementById('customer-modal');
  const delBtn=document.getElementById('modal-del');
  if(idx===null) {
    document.getElementById('modal-title').textContent='新增客戶';
    ['m-name','m-phone','m-address','m-source','m-delivery','m-note'].forEach(id=>document.getElementById(id).value='');
    delBtn.style.display='none';
  } else {
    const c=cdbData[idx];
    document.getElementById('modal-title').textContent='編輯客戶';
    document.getElementById('m-name').value=c.name||'';
    document.getElementById('m-phone').value=c.phone||'';
    document.getElementById('m-address').value=c.address||'';
    document.getElementById('m-source').value=c.source||'';
    document.getElementById('m-delivery').value=c.delivery||'';
    document.getElementById('m-note').value=c.note||'';
    delBtn.style.display='block';
  }
  modal.classList.add('show');
}

function closeModal() { document.getElementById('customer-modal').classList.remove('show'); editIdx=null; }

async function saveCustomer() {
  const name=document.getElementById('m-name').value.trim();
  if(!name) { toast('請填寫姓名'); return; }
  const c={name,phone:document.getElementById('m-phone').value.trim(),address:document.getElementById('m-address').value.trim(),source:document.getElementById('m-source').value.trim(),delivery:document.getElementById('m-delivery').value.trim(),note:document.getElementById('m-note').value.trim(),count:editIdx!==null?(cdbData[editIdx].count||1):1};
  if(editIdx!==null) cdbData[editIdx]=c; else cdbData.unshift(c);
  try { await fetch(GAS,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({type:'updateCustomer',...c})}); } catch(e) {}
  CUSTOMERS=[...cdbData];
  renderCdb(cdbData); closeModal(); toast('✓ 已儲存');
}

function delCustomer() {
  if(editIdx===null) return;
  if(!confirm('確定要刪除？')) return;
  cdbData.splice(editIdx,1); CUSTOMERS=[...cdbData];
  renderCdb(cdbData); closeModal(); toast('已刪除');
}

// ══ 設定 ══
async function loadSettings() {
  try {
    const [bRes,fRes]=await Promise.all([fetch(GAS+'?action=beans'),fetch(GAS+'?action=filters')]);
    const bData=await bRes.json(), fData=await fRes.json();
    settingsBeans=bData.items||[]; settingsFilters=fData.items||[];
    renderBeans(); renderFilters();
  } catch(e) { toast('載入失敗'); }
  renderPrices();
}

function renderBeans() {
  document.getElementById('beans-list').innerHTML=settingsBeans.map((n,i)=>`
    <div class="s-item">
      <input class="s-edit-input" value="${n.replace(/"/g,'&quot;')}" onchange="settingsBeans[${i}]=this.value">
      <button class="s-del-btn" onclick="delItem('beans',${i})">✕</button>
    </div>`).join('')||'<div style="color:var(--text3);font-size:12px;padding:8px">尚無品項</div>';
}

function renderFilters() {
  document.getElementById('filters-list').innerHTML=settingsFilters.map((n,i)=>`
    <div class="s-item">
      <input class="s-edit-input" value="${n.replace(/"/g,'&quot;')}" onchange="settingsFilters[${i}]=this.value">
      <button class="s-del-btn" onclick="delItem('filters',${i})">✕</button>
    </div>`).join('')||'<div style="color:var(--text3);font-size:12px;padding:8px">尚無品項</div>';
}

function renderPrices() {
  document.getElementById('muri-prices').innerHTML=muriMenu.map(m=>`
    <div class="s-price-row"><span class="s-price-name">${m.n}</span><span class="s-price-val">$${m.p}</span></div>`).join('');
  document.getElementById('apple-prices').innerHTML=appleMenu.map(m=>`
    <div class="s-price-row"><span class="s-price-name">${m.n}</span><span class="s-price-val">$${m.p}</span></div>`).join('');
}

async function saveList(type) {
  const listKey=type==='beans'?'settingsBeans':'settingsFilters';
  const elId=type==='beans'?'beans-list':'filters-list';
  document.querySelectorAll(`#${elId} .s-edit-input`).forEach((inp,i)=>{
    if(inp.value.trim()) window[listKey][i]=inp.value.trim();
  });
  window[listKey]=window[listKey].filter(Boolean);
  if(type==='beans') renderBeans(); else renderFilters();
  try {
    await fetch(GAS,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({type:'saveList',listType:type,items:window[listKey]})});
    toast(`✓ ${type==='beans'?'豆單':'濾掛清單'}已儲存`);
  } catch(e) { toast('儲存失敗'); }
}

function addItem(type) {
  const inputId=type==='beans'?'bean-add':'filter-add';
  const val=document.getElementById(inputId).value.trim();
  if(!val) return;
  if(type==='beans') settingsBeans.push(val); else settingsFilters.push(val);
  document.getElementById(inputId).value='';
  if(type==='beans') renderBeans(); else renderFilters();
}

function delItem(type,idx) {
  if(type==='beans') { settingsBeans.splice(idx,1); renderBeans(); }
  else { settingsFilters.splice(idx,1); renderFilters(); }
}

function toast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

go('ao');
